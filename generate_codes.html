<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成登录码 - 新疆中考英语读写题核心训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .codes-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .code-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .code-item:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .info-box {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            line-height: 1.8;
        }
        
        .info-box strong {
            color: #667eea;
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-3px);
        }
        
        .btn-info {
            background: #17a2b8;
            color: white;
        }
        
        .btn-info:hover {
            background: #138496;
            transform: translateY(-3px);
        }
        
        @media (max-width: 768px) {
            .codes-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 生成登录码</h1>
        
        <div class="info-box">
            <p><strong>登录码规则：</strong></p>
            <p>• 共生成 <strong>50个</strong> 登录码</p>
            <p>• 每个登录码由 <strong>6位</strong> 数字和字母组成</p>
            <p>• <strong>不区分大小写</strong>（输入时可以大写也可以小写）</p>
            <p>• 请将这些登录码分发给需要使用系统的用户</p>
        </div>
        
        <div class="codes-container" id="codes-container">
            <!-- 登录码将在这里显示 -->
        </div>
        
        <div class="button-container">
            <button class="btn btn-primary" onclick="generateCodes()">🔄 重新生成</button>
            <button class="btn btn-success" onclick="copyAllCodes()">📋 复制全部</button>
            <button class="btn btn-info" onclick="downloadCodes()">💾 下载到文件</button>
        </div>
    </div>
    
    <script>
        let currentCodes = [];
        
        // 生成登录码
        function generateCodes() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const codes = new Set();
            
            while (codes.size < 50) {
                let code = '';
                for (let i = 0; i < 6; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                codes.add(code);
            }
            
            currentCodes = Array.from(codes).sort();
            
            // 显示登录码
            const container = document.getElementById('codes-container');
            container.innerHTML = '';
            
            currentCodes.forEach((code, index) => {
                const codeItem = document.createElement('div');
                codeItem.className = 'code-item';
                codeItem.textContent = `${index + 1}. ${code}`;
                container.appendChild(codeItem);
            });
            
            // 保存到localStorage
            localStorage.setItem('accessCodes', JSON.stringify(currentCodes));
            
            // 提示
            alert(`已生成50个登录码！\n\n第一个登录码是：${currentCodes[0]}\n最后一个登录码是：${currentCodes[currentCodes.length - 1]}`);
        }
        
        // 复制全部登录码
        function copyAllCodes() {
            if (currentCodes.length === 0) {
                alert('请先生成登录码！');
                return;
            }
            
            const text = currentCodes.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制全部登录码到剪贴板！');
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制');
            });
        }
        
        // 下载登录码到文件
        function downloadCodes() {
            if (currentCodes.length === 0) {
                alert('请先生成登录码！');
                return;
            }
            
            const content = `新疆中考英语读写题核心训练系统 - 登录码\n\n生成时间：${new Date().toLocaleString()}\n共50个登录码（不区分大小写）\n\n${currentCodes.map((code, index) => `${index + 1}. ${code}`).join('\n')}`;
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '登录码.txt';
            a.click();
            
            URL.revokeObjectURL(url);
        }
        
        // 页面加载时自动生成登录码
        window.addEventListener('load', function() {
            generateCodes();
        });
    </script>
</body>
</html>
